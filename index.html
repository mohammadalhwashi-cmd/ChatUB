<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat UB</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <img src="ub-logo.gif" alt="Chat UB Logo" class="chat-logo">
        <img src="chat-ub-logo.gif" alt="University Logo" class="uni-logo">
    </div>
    <div class="chat-box" id="chatBox">
        <div class="welcome-message bot-message">
            مرحبًا! أنا Chat UB...
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="questionInput" placeholder="اكتب سؤالك هنا...">
        <button onclick="sendQuestion()" class="send-button">➤</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
